name: Release
on:
  push:
    branches:
      - main
      - '*[0-9].*[0-9].x'
      - '*[0-9].x.x'
      - dev
      - alpha
      - beta
  # workflow_dispatch makes it possible to trigger the run manually
  workflow_dispatch:

# `contents: read` and `id-token: write` are required for GitHub OIDC to AWS
# `id-token: write` is also required for OIDC to publish release on npm
permissions:
  contents: read
  id-token: write

jobs:
  sonarcloud:
    name: SonarCloud Quality Gate
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: SonarCloud Scan
        id: scan
        # SonarCloud intermittently rejects requests from GitHub-hosted
        # runners with HTTP 403 (AWS IP reputation blocking, confirmed by
        # SonarSource: https://community.sonarsource.com/t/-/138939). Don't
        # fail the job outright on scanner errors — the step below asks
        # SonarCloud for the actual quality gate status and only blocks the
        # release on a genuine gate failure.
        continue-on-error: true
        uses: SonarSource/sonarqube-scan-action@713881670b6b3676cda39549040e2d88c70d582e # v8.2.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      - name: Check quality gate status
        if: steps.scan.outcome == 'failure'
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        # The scan step failed. Distinguish a real quality gate failure
        # (scanner exits non-zero because of sonar.qualitygate.wait=true)
        # from transient SonarCloud infrastructure errors. Only a gate
        # reported as ERROR by SonarCloud itself blocks the release; if
        # SonarCloud is unreachable, warn and let the release proceed.
        run: |
          status=$(curl -sf -u "${SONAR_TOKEN}:" \
            "https://sonarcloud.io/api/qualitygates/project_status?projectKey=Lundalogik_lime-elements&branch=main" \
            | jq -r '.projectStatus.status') || status=UNREACHABLE
          echo "Quality gate status: ${status}"
          if [ "${status}" = "ERROR" ]; then
            echo "::error::SonarCloud quality gate is failing on main; blocking release"
            exit 1
          fi
          echo "::warning::SonarCloud scan failed, but the quality gate is not failing (status: ${status}). Treating it as a transient SonarCloud error and proceeding with the release."
  semantic-release:
    name: Run Semantic Release
    needs: [sonarcloud]
    if: ${{ always() && !failure() && !cancelled() }}
    runs-on: ubuntu-latest
    # Run in the `s3-release` environment, which holds the scoped S3 upload
    # role and restricts which branches may use it. Its deployment branch
    # policy mirrors this workflow's trigger branches.
    environment: s3-release
    outputs:
      new_release_published: ${{ steps.semantic.outputs.new_release_published }}
      new_release_version: ${{ steps.semantic.outputs.new_release_version }}
      new_release_git_tag: ${{ steps.semantic.outputs.new_release_git_tag }}
      last_release_git_tag: ${{ steps.semantic.outputs.last_release_git_tag }}
      last_release_version: ${{ steps.semantic.outputs.last_release_version }}
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        persist-credentials: false
    - uses: ./.github/actions/set-up-node
    - run: npm ci
    - run: npm run build
    - name: Semantic Release
      uses: cycjimmy/semantic-release-action@b12c8f6015dc215fe37bc154d4ad456dd3833c90 # v6.0.0
      id: semantic # Need an `id` for output variables
      with:
        semantic_version: 25.0.2
        extra_plugins: |
          @semantic-release/changelog@6.0.3
          @semantic-release/exec@7.1.0
          @semantic-release/git@10.0.1
          conventional-changelog-conventionalcommits@9.1.0
      env:
        GITHUB_TOKEN: ${{ secrets.CREATE_RELEASE }}
        GH_USERNAME: lime-opensource
        GH_TOKEN: ${{ secrets.CREATE_RELEASE }}
        CI: true
    - name: Configure AWS and Upload to S3
      if: steps.semantic.outputs.new_release_published == 'true'
      uses: ./.github/actions/upload-frontend-build-output-to-s3
      with:
        aws-role: ${{ secrets.AWS_LIMECLOUD_WRITE_STATIC_FILES_ROLE }}
        frontend-path: ./
        package-version: ${{ steps.semantic.outputs.new_release_version }}

  docs:
    needs: semantic-release
    if: needs.semantic-release.outputs.new_release_published == 'true'
    permissions:
      contents: read
    uses: ./.github/workflows/build-docs.yml
    with:
      version: "${{ needs.semantic-release.outputs.new_release_version }}"
      ref: "${{ needs.semantic-release.outputs.new_release_git_tag }}"
      forcePush: true
    secrets:
      PUBLISH_DOCS: ${{ secrets.PUBLISH_DOCS }}
