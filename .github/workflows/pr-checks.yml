name: Pull Request Checks
on: [pull_request, merge_group]

concurrency:
  # Only allow one active run of this workflow, per PR.
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
    - uses: ./.github/actions/set-up-node
    - run: npm ci
    - run: npm run lint

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
    - uses: ./.github/actions/set-up-node
    - run: npm ci
    - name: Ensure installed React and React-DOM versions match
      run: |
        REACT_VERSION=$(npm ls react --depth=0 --json | jq -r '.dependencies.react.version')
        REACT_DOM_VERSION=$(npm ls react-dom --depth=0 --json | jq -r '.dependencies["react-dom"].version')
        echo "Installed React: $REACT_VERSION"
        echo "Installed React-DOM: $REACT_DOM_VERSION"
        if [ "$REACT_VERSION" != "$REACT_DOM_VERSION" ]; then
          echo "ERROR: Installed React and React-DOM versions must match!"
          exit 1
        fi
    - run: npm run build
    - run: npm run build # Needed to avoid incremental build quirks
    - run: npm run api:verify

  test:
    name: Test
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
    - uses: ./.github/actions/set-up-node
    - run: npm ci
    - name: Cache Playwright browsers
      id: playwright-cache
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: ~/.cache/ms-playwright
        key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
        restore-keys: playwright-${{ runner.os }}-
    - name: Install Playwright browsers
      if: steps.playwright-cache.outputs.cache-hit != 'true'
      run: npx playwright install chromium --with-deps
    - run: npm test

  build-example-docs:
    name: Build Example Docs
    runs-on: ubuntu-22.04
    # Only needs to read the repo; artifact up/download use the runtime token.
    permissions:
      contents: read
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
    - uses: ./.github/actions/set-up-node
    - run: npm ci
    # The example tests run against these docs. We build them once here and share
    # the result via an artifact so each (sharded) test job doesn't rebuild. We
    # build our own rather than reuse the `docs` job's artifact: that one only
    # exists for fork and Dependabot PRs and has its asset paths rewritten for a
    # nested publish URL.
    - run: npm run docs:build
    - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: example-docs
        path: www
        retention-days: 1

  runtime-tests:
    name: Runtime Tests (shard ${{ matrix.shard }})
    needs: build-example-docs
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    # Backstop: a mass failure (each test retried once at 30s) could otherwise
    # pin the runner for a long time.
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
    - uses: ./.github/actions/set-up-node
    - run: npm ci
    - name: Cache Playwright browsers
      id: playwright-cache
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: ~/.cache/ms-playwright
        key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
        restore-keys: playwright-${{ runner.os }}-
    - name: Install Playwright browsers
      if: steps.playwright-cache.outputs.cache-hit != 'true'
      run: npx playwright install chromium --with-deps
    - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: example-docs
        path: www
    - run: npm run test:examples:runtime:ci -- --shard=${{ matrix.shard }}/2
    # Retained on failure (`trace: 'retain-on-failure'`); upload so the trace
    # viewer (DOM snapshots, console, network) is reachable from the run. Named
    # per shard because upload-artifact rejects duplicate names within a run.
    - name: Upload Playwright traces
      if: failure()
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: runtime-tests-traces-shard-${{ matrix.shard }}
        path: test-results/
        retention-days: 7

  accessibility-tests:
    name: Accessibility Tests (shard ${{ matrix.shard }})
    needs: build-example-docs
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    # Backstop, as on `runtime-tests` — plus a slower per-test axe scan, so a
    # little more headroom.
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
    - uses: ./.github/actions/set-up-node
    - run: npm ci
    - name: Cache Playwright browsers
      id: playwright-cache
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: ~/.cache/ms-playwright
        key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
        restore-keys: playwright-${{ runner.os }}-
    - name: Install Playwright browsers
      if: steps.playwright-cache.outputs.cache-hit != 'true'
      run: npx playwright install chromium --with-deps
    - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: example-docs
        path: www
    - run: npm run test:examples:accessibility:ci -- --shard=${{ matrix.shard }}/4
    # Retained on failure (`trace: 'retain-on-failure'`); upload so the trace
    # viewer (DOM snapshots, console, network) is reachable from the run. Named
    # per shard because upload-artifact rejects duplicate names within a run.
    - name: Upload Playwright traces
      if: failure()
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: accessibility-tests-traces-shard-${{ matrix.shard }}
        path: test-results/
        retention-days: 7

  commitlint:
    name: Commitlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        if: github.actor != 'dependabot[bot]' && github.event_name != 'merge_group'
      - uses: wagoid/commitlint-github-action@b948419dd99f3fd78a6548d48f94e3df7f6bf3ed # v6.2.1
        if: github.actor != 'dependabot[bot]' && github.event_name != 'merge_group'

  sonarcloud:
    name: SonarCloud
    if: >-
      github.actor != 'dependabot[bot]' &&
      github.event_name != 'merge_group' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@713881670b6b3676cda39549040e2d88c70d582e # v8.2.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
  autosquash:
    name: Block Autosquash Commits
    runs-on: ubuntu-latest
    steps:
      - name: Block Autosquash Commits
        if:  github.event_name != 'merge_group'
        uses: xt0rted/block-autosquash-commits-action@79880c36b4811fe549cfffe20233df88876024e7 # v2.2.0
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

  docs:
    name: Docs
    if: github.event_name != 'merge_group'
    permissions:
      contents: read
      pull-requests: write
    uses: ./.github/workflows/build-docs.yml
    with:
      version: "PR-${{ github.event.pull_request.number }}"
      prNumber: ${{ github.event.pull_request.number }}
      # For same-repo PRs, publish directly. For fork PRs, build only (publishing handled by publish-pr-docs workflow).
      # For Dependabot PRs, build only (no need to publish docs for dependency updates).
      buildOnly: ${{ github.event.pull_request.head.repo.fork || github.actor == 'dependabot[bot]' }}
    secrets:
      PUBLISH_DOCS: ${{ secrets.PUBLISH_DOCS }}

  automerge:
    needs: [lint, build, test, autosquash, docs]
    if: github.event.pull_request.head.repo.owner.login == 'Lundalogik' && github.actor == 'dependabot[bot]' && github.event_name != 'merge_group'
    runs-on: ubuntu-latest
    steps:
      - name: Automerge
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          MERGE_TOKEN: ${{ secrets.MERGE_AUTOMATIC_PR }}
        run: |
          curl -L -X PUT \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $MERGE_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/Lundalogik/lime-elements/pulls/$PR_NUMBER/merge \
            -d '{"merge_method":"rebase"}'
